<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fisherbook — Legal</title>
<style>
  :root {
    --teal: #12999D;
    --ink: #0E1F27;
    --bg: #F4F7F7;
    --text: #24343B;
    --muted: #63767D;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--ink);
    color: #fff;
    padding: 40px 20px;
    text-align: center;
  }
  header h1 { margin: 0 0 4px; font-size: 24px; }
  header p { margin: 0; color: #9FC8CA; font-size: 13px; }
  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 32px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  a.card {
    display: block;
    background: #fff;
    border: 1px solid #DDE6E6;
    border-radius: 12px;
    padding: 18px 20px;
    text-decoration: none;
    color: var(--ink);
    font-weight: 600;
    font-size: 15px;
  }
  a.card span {
    display: block;
    font-weight: 400;
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 24px 20px 40px;
  }
</style>
</head>
<body>
  <header>
    <h1>🎣 Fisherbook</h1>
    <p>Legal · Support</p>
  </header>
  <main>
    <a class="card" href="/privacy-policy/">
      Política de Privacidade / Privacy Policy
      <span>Como tratamos seus dados · How we handle your data</span>
    </a>
    <a class="card" href="/suporte/">
      Suporte / Support
      <span>FAQ e contato · FAQ and contact</span>
    </a>
  </main>
  <footer>
    © 2026 Fisherbook — Luiz Taira
  </footer>
</body>
</html>
